services:
  - type: web
    name: hackotomate
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
    startCommand: uvicorn backend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: DISCOVERY_FEEDS
        value: https://devpost.com/hackathons
